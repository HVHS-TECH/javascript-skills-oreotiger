<!DOCTYPE html>
<html lang="en">

<head>
  <title>T16-Arrays Continued</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--*************************************************************

<body> 
  <h1>T16-Arrays Continued</h1>
  <form onsubmit="return false;">
    <label for="formName">Name:</label>
    <input type="text" id="nameField" name="formName" placeHolder="Name">
<br> <br>
    <label for="formName">Age: </label>
    <input type="number" id="ageField" name="formAge" placeHolder="Age">
    <br> <br>
    <label for="formName">Money: </label>
    <input type="number" id="moneyField" name="formMoney" placeholder="Money">
    <input type="submit" onClick=start()>
    <br> <br>
  </form> 
    <p>On a scale of 0-3 how much do you like chocolate?</p>
    <form onsubmit="return false;">
      <label for="formName">Choose:</label>
      <input type="number" id="chooseField" placeHolder="Rating">
      <input type="submit" onClick=chocolate()>
    </form>
    <p>What would you like to add to your shopping list?</p>
    <form onsubmit="return false;">
      <label for="formName">Item:</label>
      <input type="text" id="itemField" placeHolder="Item">
      <input type="submit" onClick=cart()>
    </form>

  <div id="spaceForJavaScriptOutput">

    

  </div>


  <script src="../t16_arrays_continued.js"></script>

</body>

</html>
